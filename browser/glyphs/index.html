<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warframe Glyph Matrix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
:root {
    --accent: #c2a24d;
    --text: #fff6e8;
    --muted: rgba(255, 246, 232, 0.62);
    --border: rgba(194,162,77,0.24);
    --border-strong: rgba(194,162,77,0.62);
    --shadow: 0 12px 36px rgba(0,0,0,0.35);
    --font-primary: 'Exo 2', 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'Share Tech Mono', 'JetBrains Mono', monospace;
    --transition: 220ms cubic-bezier(0.4,0,0.2,1);
}

*, *::before, *::after { box-sizing: border-box; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
    margin: 0;
    min-height: 100vh;
    font-family: var(--font-primary);
    color: var(--text);
    background:
        radial-gradient(ellipse at 10% 12%, rgba(194,162,77,0.08) 0%, transparent 40%),
        radial-gradient(ellipse at 88% 82%, rgba(99,179,255,0.08) 0%, transparent 42%),
        linear-gradient(180deg, #11100f 0%, #181412 100%);
}

a { color: inherit; text-decoration: none; }
button, input { font: inherit; }

.page {
    max-width: 1680px;
    margin: 0 auto;
    padding: 0.95rem;
}

.card {
    background: linear-gradient(180deg, rgba(42,33,30,0.94), rgba(31,25,22,0.94));
    border: 1px solid var(--border);
    border-radius: 0.9rem;
    box-shadow: var(--shadow);
}

.toolbar {
    position: sticky;
    top: 0;
    z-index: 10;
    padding: 0.75rem;
    display: grid;
    grid-template-columns: minmax(260px, 1fr) auto auto;
    gap: 0.65rem;
    align-items: center;
    margin-bottom: 0.75rem;
}

.searchbox {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    border-radius: 0.65rem;
    padding: 0.65rem 0.75rem;
}
.searchbox input {
    width: 100%;
    border: 0;
    outline: 0;
    background: transparent;
    color: var(--text);
    font-size: 0.92rem;
}
.searchbox input::placeholder { color: rgba(255,246,232,0.35); }

.controls {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
}

.pill {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    color: var(--text);
    padding: 0.33rem 0.58rem;
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
}
.pill.active {
    background: rgba(194,162,77,0.16);
    border-color: var(--border-strong);
    color: var(--accent);
}

.side-controls {
    display: flex;
    align-items: center;
    gap: 0.55rem;
}

.count {
    font-size: 0.76rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    white-space: nowrap;
}

.switch {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    font-weight: 700;
    user-select: none;
    cursor: pointer;
}
.switch input { accent-color: var(--accent); }
.switch.hidden { display: none; }

.matrix {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(166px, 1fr));
    gap: 0.75rem;
}

.tile {
    position: relative;
    aspect-ratio: 1 / 1;
    border-radius: 1rem;
    overflow: hidden;
    border: 1px solid rgba(194,162,77,0.22);
    background:
        radial-gradient(circle at 20% 15%, rgba(194,162,77,0.18), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0.28));
    cursor: pointer;
    transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
}
.tile:hover {
    transform: translateY(-2px) scale(1.01);
    border-color: var(--border-strong);
    box-shadow: 0 14px 32px rgba(0,0,0,0.28);
}
.tile img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.results-empty {
    padding: 0.95rem;
    border: 1px dashed var(--border);
    border-radius: 0.65rem;
    color: var(--muted);
    text-align: center;
}

.toast {
    position: fixed;
    right: 0.9rem;
    bottom: 0.9rem;
    z-index: 40;
    border: 1px solid var(--border-strong);
    background: rgba(16,13,11,0.95);
    color: var(--accent);
    padding: 0.5rem 0.66rem;
    border-radius: 0.55rem;
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 160ms ease, transform 160ms ease;
    pointer-events: none;
}
.toast.show {
    opacity: 1;
    transform: translateY(0);
}

.dialog {
    border: 1px solid var(--border);
    border-radius: 0.9rem;
    background: linear-gradient(180deg, rgba(42,33,30,0.98), rgba(31,25,22,0.98));
    color: var(--text);
    max-width: min(560px, calc(100vw - 1.2rem));
    width: 100%;
    padding: 0;
}
.dialog::backdrop { background: rgba(0,0,0,0.68); }
.dialog-body { padding: 0.9rem; }
.dialog-title {
    margin: 0;
    font-size: 1.05rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
}
.code-box {
    margin-top: 0.65rem;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    line-height: 1.5;
    color: var(--accent);
    border: 1px solid var(--border);
    border-radius: 0.55rem;
    background: rgba(255,255,255,0.03);
    padding: 0.56rem;
    word-break: break-all;
}
.dialog-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.45rem;
    margin-top: 0.75rem;
}
.btn {
    border: 1px solid var(--border);
    background: rgba(194,162,77,0.08);
    color: var(--text);
    border-radius: 0.4rem;
    padding: 0.4rem 0.62rem;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
}
.btn:hover { background: rgba(194,162,77,0.16); border-color: var(--border-strong); }
.btn.primary {
    background: linear-gradient(135deg, var(--accent), #e0c36f);
    color: #2a211e;
    border-color: var(--accent);
}

@media (max-width: 940px) {
    .toolbar {
        grid-template-columns: 1fr;
        position: static;
    }
    .side-controls {
        justify-content: space-between;
    }
}

@media (max-width: 720px) {
    .page { padding: 0.62rem; }
    .matrix { grid-template-columns: repeat(auto-fill, minmax(132px, 1fr)); }
}
    </style>
</head>
<body>
    <main class="page">
        <section class="toolbar card">
            <div class="searchbox">
                <span>⌕</span>
                <input id="searchInput" type="search" placeholder="Search glyph name..." autocomplete="off">
            </div>
            <div class="controls">
                <button class="pill active" type="button" data-filter="all">All</button>
                <button class="pill" type="button" data-filter="codex">Codex</button>
                <button class="pill" type="button" data-filter="community">Community</button>
                <button class="pill" type="button" data-filter="seasonal">Seasonal</button>
            </div>
            <div class="side-controls">
                <div id="glyphCount" class="count">Loading...</div>
                <label class="switch" for="fastCopySwitch">
                    <input id="fastCopySwitch" type="checkbox">
                    Fast copy
                </label>
            </div>
        </section>

        <section id="matrix" class="matrix"></section>
    </main>

    <dialog class="dialog" id="glyphDialog">
        <div class="dialog-body">
            <h2 class="dialog-title" id="dialogTitle">Glyph</h2>
            <div class="code-box" id="dialogCode"></div>
            <div class="dialog-actions">
                <button class="btn" id="closeDialogBtn" type="button">Close</button>
                <button class="btn primary" id="copyDialogBtn" type="button">Copy code</button>
            </div>
        </div>
    </dialog>

    <div id="toast" class="toast">Copied</div>

    <script>
const GLYPH_URL = 'https://raw.githubusercontent.com/WFCD/warframe-items/master/data/json/Glyphs.json';
const STORAGE_KEY = 'warframe-glyph-browser-v2';
const GLYPH_CODE_PREFIX = '/Lotus/Types/StoreItems/AvatarImages/';

const els = {
    searchInput: document.getElementById('searchInput'),
    matrix: document.getElementById('matrix'),
    glyphCount: document.getElementById('glyphCount'),
    fastCopySwitch: document.getElementById('fastCopySwitch'),
    glyphDialog: document.getElementById('glyphDialog'),
    dialogTitle: document.getElementById('dialogTitle'),
    dialogCode: document.getElementById('dialogCode'),
    closeDialogBtn: document.getElementById('closeDialogBtn'),
    copyDialogBtn: document.getElementById('copyDialogBtn'),
    toast: document.getElementById('toast'),
};

let glyphs = [];
let filteredGlyphs = [];
let activeFilter = 'all';
let searchValue = '';
let fastCopy = false;
let popupGlyph = null;

const escapeHtml = (value) => String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');

const glyphImageUrl = (glyph) => `https://cdn.warframestat.us/img/${glyph.imageName}`;

const extractGlyphCode = (glyph) => {
    const uniqueName = String(glyph?.uniqueName || '');
    if (uniqueName.startsWith(GLYPH_CODE_PREFIX)) {
        return uniqueName.slice(GLYPH_CODE_PREFIX.length).replace(/^\/+/, '');
    }

    const imageName = String(glyph?.imageName || '');
    if (imageName) {
        return imageName
            .replace(/\.png$/i, '')
            .replace(/-[a-f0-9]{8,}$/i, '')
            .replace(/[^a-zA-Z0-9/_-]/g, '-');
    }

    return String(glyph?.name || 'glyph').trim().replace(/\s+/g, '-');
};

const glyphCode = (glyph) => `${GLYPH_CODE_PREFIX}${extractGlyphCode(glyph)}`;

const updateFastCopyVisibility = () => {
    const codexOnly = activeFilter === 'codex';
    if (codexOnly) {
        els.fastCopySwitch.parentElement.classList.remove('hidden');
        return;
    }

    fastCopy = false;
    els.fastCopySwitch.checked = false;
    els.fastCopySwitch.parentElement.classList.add('hidden');
};

const showToast = (text) => {
    els.toast.textContent = text;
    els.toast.classList.add('show');
    clearTimeout(showToast.timer);
    showToast.timer = setTimeout(() => {
        els.toast.classList.remove('show');
    }, 1200);
};

const copyText = async (text) => {
    if (!text) return false;
    try {
        await navigator.clipboard.writeText(text);
        return true;
    } catch {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand('copy');
        ta.remove();
        return ok;
    }
};

const glyphClass = (glyph) => {
    const name = `${glyph.name || ''} ${glyph.description || ''}`.toLowerCase();
    if (name.includes('community') || name.includes('artist') || name.includes('showcase')) return 'community';
    if (name.includes('summer') || name.includes('winter') || name.includes('holiday') || name.includes('season') || name.includes('halloween') || name.includes('festive')) return 'seasonal';
    if (name.includes('codex') || name.includes('profile')) return 'codex';
    return 'all';
};

const loadState = () => {
    try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        if (typeof parsed.searchValue === 'string') searchValue = parsed.searchValue;
        if (typeof parsed.activeFilter === 'string') activeFilter = parsed.activeFilter;
        if (typeof parsed.fastCopy === 'boolean') fastCopy = parsed.fastCopy;
    } catch {
        searchValue = '';
        activeFilter = 'all';
        fastCopy = false;
    }
};

const saveState = () => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
        searchValue,
        activeFilter,
        fastCopy,
    }));
};

const applyFilter = () => {
    const query = searchValue.trim().toLowerCase();
    filteredGlyphs = glyphs.filter((glyph) => {
        const text = `${glyph.name || ''} ${glyph.description || ''} ${glyph.category || ''}`.toLowerCase();
        const filterMatch = activeFilter === 'all' || glyph.categoryClass === activeFilter;
        const queryMatch = !query || text.includes(query);
        return filterMatch && queryMatch;
    });
};

const renderMatrix = () => {
    els.glyphCount.textContent = `${filteredGlyphs.length} glyph${filteredGlyphs.length === 1 ? '' : 's'}`;

    if (!glyphs.length) {
        els.matrix.innerHTML = '<div class="results-empty">Loading glyphs...</div>';
        return;
    }

    if (!filteredGlyphs.length) {
        els.matrix.innerHTML = '<div class="results-empty">No glyphs match the current search or filter.</div>';
        return;
    }

    els.matrix.innerHTML = filteredGlyphs.map((glyph) => {
        const imageUrl = glyphImageUrl(glyph);
        return `
            <button class="tile" type="button" data-code="${escapeHtml(glyphCode(glyph))}">
                <img src="${escapeHtml(imageUrl)}" alt="${escapeHtml(glyph.name)}" loading="lazy">
            </button>
        `;
    }).join('');

    els.matrix.querySelectorAll('[data-code]').forEach((button, idx) => {
        button.addEventListener('click', async () => {
            const glyph = filteredGlyphs[idx];
            const code = glyphCode(glyph);

            if (fastCopy && glyph.categoryClass === 'codex') {
                const copied = await copyText(code);
                showToast(copied ? 'Code copied' : 'Copy failed');
                return;
            }

            popupGlyph = glyph;
            els.dialogTitle.textContent = glyph.name || 'Glyph';
            els.dialogCode.textContent = code;
            if (typeof els.glyphDialog.showModal === 'function') {
                els.glyphDialog.showModal();
            }
        });
    });
};

const applyAndRender = () => {
    applyFilter();
    renderMatrix();
    saveState();
};

const setFilter = (filter) => {
    activeFilter = filter;
    document.querySelectorAll('[data-filter]').forEach((button) => {
        button.classList.toggle('active', button.dataset.filter === filter);
    });
    updateFastCopyVisibility();
    applyAndRender();
};

const wireEvents = () => {
    els.searchInput.addEventListener('input', (event) => {
        searchValue = event.target.value;
        applyAndRender();
    });

    document.querySelectorAll('[data-filter]').forEach((button) => {
        button.classList.toggle('active', button.dataset.filter === activeFilter);
        button.addEventListener('click', () => setFilter(button.dataset.filter));
    });

    els.fastCopySwitch.checked = fastCopy;
    updateFastCopyVisibility();
    els.fastCopySwitch.addEventListener('change', () => {
        fastCopy = els.fastCopySwitch.checked;
        saveState();
    });

    els.closeDialogBtn.addEventListener('click', () => {
        if (typeof els.glyphDialog.close === 'function') els.glyphDialog.close();
    });

    els.copyDialogBtn.addEventListener('click', async () => {
        const copied = await copyText(glyphCode(popupGlyph || {}));
        showToast(copied ? 'Code copied' : 'Copy failed');
    });

    document.addEventListener('keydown', (event) => {
        const isMac = navigator.platform.toLowerCase().includes('mac');
        if ((isMac ? event.metaKey : event.ctrlKey) && event.key.toLowerCase() === 'k') {
            event.preventDefault();
            els.searchInput.focus();
        }
    });
};

const loadGlyphs = async () => {
    loadState();
    els.searchInput.value = searchValue;
    wireEvents();

    try {
        const response = await fetch(GLYPH_URL, { cache: 'no-cache' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        if (!Array.isArray(data)) throw new Error('Unexpected Glyphs.json format');

        glyphs = data
            .filter((glyph) => glyph?.imageName && glyph?.name)
            .map((glyph) => ({
                ...glyph,
                categoryClass: glyphClass(glyph),
            }))
            .sort((a, b) => a.name.localeCompare(b.name));

        if (!glyphs.length) throw new Error('No glyph records found');
        applyAndRender();
    } catch (error) {
        els.matrix.innerHTML = `<div class="results-empty">Unable to load glyph data: ${escapeHtml(error.message)}</div>`;
        els.glyphCount.textContent = '0 glyphs';
    }
};

loadGlyphs();
    </script>
</body>
</html>
